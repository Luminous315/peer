<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpeningBookmarksSection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Gaegu:wght@400;700&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', 'Gaegu', 'Noto Sans SC', sans-serif;
            background-color: #feebd4;
            overflow: hidden;
        }

        #opening-bookmarks-section {
            min-height: 100svh;
            display: grid;
            place-items: center;
            padding: 12px;
        }

        #hero-canvas-shell {
            position: relative;
            flex: 0 0 auto;
        }

        #interactive-canvas {
            position: absolute;
            inset: 0 auto auto 0;
            width: 620px;
            height: 775px;
            transform-origin: top left;
        }

        /* Comic Book Halftone Dots Pattern for retro texture */
        .halftone-bg {
            background-image: radial-gradient(#222 25%, transparent 26%);
            background-size: 5px 5px;
            background-repeat: repeat;
        }

        /* Spring-physics cubic bezier for realistic sticker pulling motion */
        .bookmark-transition {
            transition: transform 0.4s cubic-bezier(0.34, 1.65, 0.64, 1), filter 0.3s ease;
        }

        /* Handdrawn drop shadow to mimic thick paper stickers */
        .diecut-shadow {
            filter: drop-shadow(4px 4px 0px rgba(0, 0, 0, 0.9));
        }

        /* Hover elevation effect */
        .bookmark-hover:hover {
            transform: translateY(-110px) scale(1.04) rotate(0deg) !important;
            z-index: 50 !important;
        }

        .bookmark-hover.is-touch-raised {
            transform: translateY(-92px) scale(1.035) rotate(0deg) !important;
            z-index: 50 !important;
        }

        /* Interactive Star Physics */
        .star-interactive {
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
            cursor: pointer;
            animation: star-breathing 2.8s ease-in-out infinite;
            will-change: transform, filter;
        }
        .star-interactive:nth-child(2) { animation-delay: -.45s; }
        .star-interactive:nth-child(3) { animation-delay: -.9s; }
        .star-interactive:nth-child(4) { animation-delay: -1.35s; }
        .star-interactive:nth-child(5) { animation-delay: -1.8s; }
        .star-interactive:nth-child(6) { animation-delay: -2.25s; }

        @keyframes star-breathing {
            0%, 100% {
                transform: scale(.94) rotate(-3deg);
                filter: drop-shadow(0 0 0 rgba(251, 191, 36, 0));
            }
            50% {
                transform: scale(1.12) rotate(3deg);
                filter: drop-shadow(0 0 9px rgba(251, 191, 36, .38));
            }
        }

        .star-interactive:hover {
            animation-play-state: paused;
            transform: scale(1.4) rotate(144deg);
            filter: drop-shadow(0 0 12px rgba(251, 191, 36, 0.8));
        }

        /* Particle star styling */
        .star-particle {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            animation: particle-fade-drift 1.2s ease-out forwards;
        }

        @keyframes particle-fade-drift {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0.3) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes banner-breath {
            0%, 100% {
                transform: scale(1) rotate(6deg);
            }
            50% {
                transform: scale(1.05) rotate(4deg);
            }
        }
        .banner-breathing {
            animation: banner-breath 3s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
        }
        .banner-breathing:hover {
            animation-play-state: paused;
            transform: scale(1.15) rotate(10deg) !important;
            filter: drop-shadow(6px 6px 0px rgba(244, 114, 182, 0.6));
        }
        .banner-breathing:active {
            transform: scale(0.95) rotate(2deg) !important;
        }

        @media (max-width: 640px) {
            #opening-bookmarks-section {
                padding: 8px;
            }

            .opening-hint {
                max-width: 90vw;
                font-size: 10px !important;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(254, 243, 199, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: #f59e0b;
            border-radius: 99px;
        }
    </style>
</head>

<script>
    let audioCtx;
    
    function playCuteSound(type) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        if (!audioCtx) audioCtx = new AudioContextClass();

        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'hover') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(350, now);
            osc.frequency.exponentialRampToValueAtTime(700, now + 0.1);
            gainNode.gain.setValueAtTime(0.04, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'star') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, now);
            osc.frequency.exponentialRampToValueAtTime(1760, now + 0.15);
            gainNode.gain.setValueAtTime(0.06, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
        } else if (type === 'banner-pop') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
            gainNode.gain.setValueAtTime(0.08, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
        } else if (type === 'click-success') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(390, now);
            osc.frequency.exponentialRampToValueAtTime(1400, now + 0.35);
            gainNode.gain.setValueAtTime(0.12, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
            osc.start(now);
            osc.stop(now + 0.35);
        } else {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(220, now);
            osc.frequency.exponentialRampToValueAtTime(480, now + 0.08);
            gainNode.gain.setValueAtTime(0.07, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            osc.start(now);
            osc.stop(now + 0.08);
        }
    }
</script>

                    </button>

                        继续查看
                    </button>

        <!-- Touch Prompt Info -->
        <p class="opening-hint text-xs text-stone-600 font-bold mt-4 animate-pulse uppercase tracking-wide text-center">
            💡 点击黑色问号进入 About Me；点击粉色大手可先确认。触摸星星有惊喜！
        </p>

</main>

<script>
    const interactiveCanvas = document.getElementById('interactive-canvas');
    const canvasShell = document.getElementById('hero-canvas-shell');
    const secretBookmark = document.getElementById('bookmark-secret');
    const giantHand = document.getElementById('giant-hand-hit');

    function fitHeroCanvas() {
        const designWidth = 620;
        const designHeight = 775;
        const availableWidth = Math.max(280, window.innerWidth - 28);
        const availableHeight = Math.max(440, window.innerHeight - 68);
        const scale = Math.min(1, availableWidth / designWidth, availableHeight / designHeight);

        interactiveCanvas.style.transform = `scale(${scale})`;
        canvasShell.style.width = `${designWidth * scale}px`;
        canvasShell.style.height = `${designHeight * scale}px`;
    }

    fitHeroCanvas();
    window.addEventListener('resize', fitHeroCanvas);

    // Dialogue Bubble engine
    let bubbleTimeout;
    function triggerBubble(text) {
        playCuteSound('click');
        const bubble = document.getElementById('dialogue-bubble');
        const bubbleTxt = document.getElementById('bubble-text');
        
        bubbleTxt.innerText = text;
        bubble.classList.remove('translate-y-24', 'opacity-0', 'pointer-events-none');
        bubble.classList.add('translate-y-0', 'opacity-100');

        clearTimeout(bubbleTimeout);
        bubbleTimeout = setTimeout(hideBubble, 5000);
    }

    function hideBubble() {
        const bubble = document.getElementById('dialogue-bubble');
        bubble.classList.add('translate-y-24', 'opacity-0', 'pointer-events-none');
        bubble.classList.remove('translate-y-0', 'opacity-100');
    }

    // Sparkle Particle Spawner for Stars and Banners
    function spawnParticles(element, color, particleChar = '✦') {
        playCuteSound('star');
        const container = document.getElementById('interactive-canvas');
        const rect = element.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();
        
        const x = rect.left - containerRect.left + rect.width / 2;
        const y = rect.top - containerRect.top + rect.height / 2;

        for (let i = 0; i < 8; i++) {
            const particle = document.createElement('div');
            particle.className = 'star-particle text-xs';
            particle.innerHTML = particleChar;
            particle.style.color = color;
            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;

            const angle = Math.random() * Math.PI * 2;
            const distance = 40 + Math.random() * 70;
            const dx = Math.cos(angle) * distance;
            const dy = Math.sin(angle) * distance + 20;

            particle.style.setProperty('--dx', `${dx}px`);
            particle.style.setProperty('--dy', `${dy}px`);

            container.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 1200);
        }
    }

    // Interactive Explosion for the "pickup ME!" Banner
    function bannerExplosion(element) {
        playCuteSound('banner-pop');
        // Spawn pretty hearts and pink sparkles
        const chars = ['🌸', '💖', '✨', '♥', '✦'];
        for (let i = 0; i < 3; i++) {
            const randChar = chars[Math.floor(Math.random() * chars.length)];
            spawnParticles(element, '#ec4899', randChar);
        }
    }

    function enterResume() {
        playCuteSound('click-success');
        window.parent.postMessage({
            type: 'opening-bookmarks:enter',
            target: '#about'
        }, '*');
    }

    function showConfirmModal() {
        playCuteSound('click');
        confirmModal.classList.remove('hidden');
        requestAnimationFrame(() => {
            confirmModal.classList.remove('opacity-0');
            confirmModal.querySelector(':scope > div').classList.remove('scale-95');
        });
    }

    function handleKeyboardAction(event, callback) {
        if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            callback();
        }
    }

    // 黑色问号直接进入 About Me；粉色大手保留确认弹窗
    const confirmModal = document.getElementById('custom-confirm-modal');
    const modalConfirmBtn = document.getElementById('modal-confirm-btn');
    const modalCancelBtn = document.getElementById('modal-cancel-btn');

    secretBookmark.addEventListener('click', function(event) {
        event.stopPropagation();
        enterResume();
    });
    secretBookmark.addEventListener('keydown', (event) => handleKeyboardAction(event, enterResume));

    giantHand.addEventListener('click', function(event) {
        event.stopPropagation();
        showConfirmModal();
    });
    giantHand.addEventListener('keydown', (event) => handleKeyboardAction(event, showConfirmModal));

    modalCancelBtn.addEventListener('click', () => {
        confirmModal.classList.add('opacity-0');
        confirmModal.querySelector(':scope > div').classList.add('scale-95');
        setTimeout(() => {
            confirmModal.classList.add('hidden');
        }, 300);
    });

    modalConfirmBtn.addEventListener('click', () => {
        confirmModal.classList.add('opacity-0');
        confirmModal.querySelector(':scope > div').classList.add('scale-95');
        setTimeout(() => {
            confirmModal.classList.add('hidden');
            enterResume();
        }, 300);
    });

    // 触屏设备用点击代替 hover 上移，同时保留 dialogue bubble。
    document.querySelectorAll('.bookmark-hover').forEach((bookmark) => {
        bookmark.addEventListener('click', () => {
            if (!window.matchMedia('(hover: none)').matches) return;
            document.querySelectorAll('.bookmark-hover.is-touch-raised').forEach((item) => {
                if (item !== bookmark) item.classList.remove('is-touch-raised');
            });
            bookmark.classList.toggle('is-touch-raised');
        });
    });
</script>
